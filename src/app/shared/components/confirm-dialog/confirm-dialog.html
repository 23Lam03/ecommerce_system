@if (isOpen()) {
  <div class="fixed inset-0 z-[9998] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm animate-fade-in" (click)="onCancel()"></div>

    <!-- Dialog -->
    <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 animate-scale-in">
      <!-- Icon -->
      <div class="flex items-center justify-center w-14 h-14 mx-auto rounded-full mb-4"
           [class]="danger() ? 'bg-red-100' : 'bg-indigo-100'">
        @if (danger()) {
          <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
          </svg>
        } @else {
          <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        }
      </div>

      <!-- Content -->
      <h3 class="text-lg font-bold text-gray-900 text-center mb-2">{{ title() }}</h3>
      <p class="text-gray-500 text-center text-sm mb-6">{{ message() }}</p>

      <!-- Actions -->
      <div class="flex gap-3">
        <button
          (click)="onCancel()"
          class="flex-1 px-4 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors cursor-pointer"
        >
          {{ cancelText() }}
        </button>
        <button
          (click)="onConfirm()"
          class="flex-1 px-4 py-2.5 text-sm font-medium text-white rounded-xl transition-all cursor-pointer active:scale-95"
          [class]="danger() ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700'"
        >
          {{ confirmText() }}
        </button>
      </div>
    </div>
  </div>
}
