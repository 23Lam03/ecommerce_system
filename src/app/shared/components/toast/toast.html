<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 min-w-[320px] max-w-[420px]">
  @for (toast of notificationService.toasts(); track toast.id) {
    <div
      class="flex items-start gap-3 p-4 rounded-xl shadow-2xl border backdrop-blur-sm animate-slide-in-right"
      [class]="toast.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
               toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' :
               toast.type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
               'bg-sky-50 border-sky-200 text-sky-800'"
    >
      <div class="flex-shrink-0 text-xl mt-0.5">
        @switch (toast.type) {
          @case ('success') { <span>✅</span> }
          @case ('error') { <span>❌</span> }
          @case ('warning') { <span>⚠️</span> }
          @case ('info') { <span>ℹ️</span> }
        }
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-sm">{{ toast.title }}</p>
        <p class="text-sm opacity-80 mt-0.5">{{ toast.message }}</p>
      </div>
      <button
        (click)="notificationService.dismiss(toast.id)"
        class="flex-shrink-0 p-1 rounded-lg hover:bg-black/10 transition-colors cursor-pointer"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
</div>
