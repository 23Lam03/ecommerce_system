<div class="p-6 lg:p-8">
  <h1 class="text-2xl font-bold mb-1">Quản lý khách hàng</h1>
  <p class="text-sm text-slate-500 mb-6">Mã: <span class="font-mono text-indigo-600">AD-ADM04</span></p>

  <input type="search" [value]="searchQuery()" (input)="searchQuery.set($any($event.target).value)" placeholder="Tìm tên, email..."
    class="w-full max-w-md mb-4 px-4 py-2.5 text-sm border rounded-xl" />

  <div class="bg-white rounded-2xl border overflow-hidden shadow-sm">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 border-b"><tr>
        <th class="text-left px-4 py-3">Khách hàng</th>
        <th class="text-left px-4 py-3 hidden md:table-cell">Liên hệ</th>
        <th class="text-center px-4 py-3">Trạng thái</th>
        <th class="text-right px-4 py-3">Thao tác</th>
      </tr></thead>
      <tbody class="divide-y">
        @for (u of customers(); track u.id) {
          <tr class="hover:bg-slate-50">
            <td class="px-4 py-3">
              <div class="flex items-center gap-3">
                <img [src]="u.avatar" class="w-9 h-9 rounded-full" [alt]="u.fullName" />
                <div><p class="font-medium">{{ u.fullName }}</p><p class="text-xs text-slate-400 font-mono">{{ u.id }}</p></div>
              </div>
            </td>
            <td class="px-4 py-3 hidden md:table-cell text-slate-600">{{ u.email }}<br/><span class="text-xs">{{ u.phone }}</span></td>
            <td class="px-4 py-3 text-center"><span class="text-xs px-2 py-1 rounded-full font-semibold" [class]="statusClass(u.status)">{{ u.status }}</span></td>
            <td class="px-4 py-3 text-right space-x-2">
              <button type="button" (click)="toggleStatus(u)" class="text-xs font-semibold text-indigo-600 hover:underline cursor-pointer">{{ u.status === 'active' ? 'Vô hiệu' : 'Kích hoạt' }}</button>
              <button type="button" (click)="confirmDeactivate(u)" class="text-xs font-semibold text-red-600 hover:underline cursor-pointer">Khóa</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<app-confirm-dialog [isOpen]="showDeactivate()" title="Khóa tài khoản" message="Xác nhận khóa vĩnh viễn tài khoản này?" confirmText="Khóa" [danger]="true" (confirmed)="onDeactivateConfirmed()" (cancelled)="showDeactivate.set(false)" />
