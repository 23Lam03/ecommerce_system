<div class="p-6 lg:p-8">
  <h1 class="text-2xl lg:text-3xl font-bold text-slate-900 mb-1">Báo cáo tổng quan</h1>
  <p class="text-sm text-slate-500 mb-8">Mã: <span class="font-mono text-indigo-600">AD-ADM06</span></p>

  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-2xl border p-5 shadow-sm">
      <p class="text-sm text-slate-500">Cửa hàng</p>
      <p class="text-3xl font-bold text-indigo-600 mt-1">{{ stats().shops }}</p>
    </div>
    <div class="bg-white rounded-2xl border p-5 shadow-sm">
      <p class="text-sm text-slate-500">Sản phẩm</p>
      <p class="text-3xl font-bold text-violet-600 mt-1">{{ stats().products }}</p>
    </div>
    <div class="bg-white rounded-2xl border p-5 shadow-sm">
      <p class="text-sm text-slate-500">Đơn hàng</p>
      <p class="text-3xl font-bold text-sky-600 mt-1">{{ stats().orders }}</p>
    </div>
    <div class="bg-white rounded-2xl border p-5 shadow-sm col-span-2 lg:col-span-1">
      <p class="text-sm text-slate-500">Doanh thu</p>
      <p class="text-xl lg:text-2xl font-bold text-emerald-600 mt-1">{{ stats().revenue | currencyVnd }}</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl border p-6 shadow-sm">
    <h2 class="font-bold text-slate-800 mb-6">Doanh thu 6 tháng (triệu ₫)</h2>
    <div class="flex items-end justify-between gap-3 h-48">
      @for (bar of chartData(); track bar.label) {
        <div class="flex-1 flex flex-col items-center gap-2">
          <div class="w-full bg-slate-100 rounded-t-lg flex items-end justify-center" style="height: 160px">
            <div class="w-full max-w-[48px] bg-indigo-500 rounded-t-lg transition-all" [style.height.%]="bar.pct"></div>
          </div>
          <span class="text-xs text-slate-500">{{ bar.label }}</span>
          <span class="text-xs font-semibold text-slate-700">{{ bar.value }}M</span>
        </div>
      }
    </div>
  </div>
</div>
