<!-- SH-SPT01: Hỗ trợ khách hàng -->
<section class="p-6 lg:p-8 h-[calc(100vh-4rem)] flex flex-col">
  <!-- Header -->
  <div class="mb-4">
    <h1 class="text-2xl font-bold text-slate-900">Hỗ trợ khách hàng</h1>
    <p class="text-sm text-slate-500">
      Mã màn hình: <span class="font-mono text-emerald-600">SH-SPT01</span>
    </p>
  </div>

  <!-- Chat container -->
  <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden">
    <!-- Messages area -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      @for (msg of sortedMessages; track msg.id) {
        <div class="flex" [class.justify-end]="msg.sender === 'shop'" [class.justify-start]="msg.sender === 'customer'">
          @if (msg.sender === 'customer') {
            <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-600 shrink-0 mr-2">
              KH
            </div>
          }
          <div
            class="max-w-[70%] px-4 py-2.5 rounded-2xl text-sm"
            [class]="msg.sender === 'shop'
              ? 'bg-emerald-600 text-white rounded-br-sm'
              : 'bg-slate-100 text-slate-800 rounded-bl-sm'"
          >
            <p>{{ msg.text }}</p>
            <p class="text-[10px] mt-1 opacity-60">{{ fmtTime(msg.timestamp) }}</p>
          </div>
          @if (msg.sender === 'shop') {
            <div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-xs font-bold text-white shrink-0 ml-2">
              SH
            </div>
          }
        </div>
      }
    </div>

    <!-- Input area -->
    <div class="border-t border-slate-200 p-4 flex gap-3">
      <input
        type="text"
        [value]="newMessage()"
        (input)="newMessage.set($any($event.target).value)"
        (keydown.enter)="sendMessage()"
        placeholder="Nhập tin nhắn phản hồi..."
        class="flex-1 px-4 py-2.5 text-sm border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500"
      />
      <button
        type="button"
        (click)="sendMessage()"
        [disabled]="!newMessage().trim()"
        class="px-5 py-2.5 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 transition-colors disabled:opacity-50 cursor-pointer"
      >
        Gửi
      </button>
      <button
        type="button"
        (click)="clearChat()"
        class="px-3 py-2.5 border border-slate-200 text-slate-400 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer"
        title="Xóa cuộc trò chuyện"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </div>
</section>
