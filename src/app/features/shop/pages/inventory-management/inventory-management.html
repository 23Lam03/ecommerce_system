<div class="p-6 lg:p-8">
  <h1 class="text-2xl font-bold text-slate-900 mb-1">Quản lý kho</h1>
  <p class="text-sm text-slate-500 mb-6">Mã: <span class="font-mono text-emerald-600">SH-INV01</span></p>

  <div class="bg-white rounded-2xl border shadow-sm overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 border-b"><tr>
        <th class="text-left px-4 py-3">Sản phẩm</th>
        <th class="text-center px-4 py-3">Tồn hiện tại</th>
        <th class="text-center px-4 py-3">Cập nhật nhanh</th>
        <th class="text-right px-4 py-3"></th>
      </tr></thead>
      <tbody class="divide-y">
        @for (p of products(); track p.id) {
          <tr>
            <td class="px-4 py-3 font-medium">{{ p.name }}</td>
            <td class="px-4 py-3 text-center">
              <span [class]="p.stock < 10 ? 'text-red-600 font-bold' : ''">{{ p.stock }}</span>
            </td>
            <td class="px-4 py-3 text-center">
              <input type="number" [value]="getStock(p.id, p.stock)" (input)="onStockInput(p.id, $event)" min="0"
                class="w-24 px-2 py-1.5 text-center border border-slate-200 rounded-lg mx-auto" />
            </td>
            <td class="px-4 py-3 text-right">
              <button type="button" (click)="saveStock(p.id)" [disabled]="savingId() === p.id || stockEdits()[p.id] == null"
                class="px-3 py-1.5 text-xs font-semibold bg-emerald-600 text-white rounded-lg disabled:opacity-50 cursor-pointer">
                {{ savingId() === p.id ? '...' : 'Lưu' }}
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
