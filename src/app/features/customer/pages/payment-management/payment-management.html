<section class="max-w-3xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-slate-900 mb-1">Lịch sử thanh toán</h1>
  <p class="text-sm text-slate-500 mb-6">Mã: <span class="font-mono text-indigo-600">CTM-FIN01</span></p>

  <div class="space-y-3">
    @for (t of transactions(); track t.id) {
      <article class="bg-white rounded-2xl border p-4 flex flex-wrap justify-between gap-3 shadow-sm">
        <div>
          <p class="font-mono font-semibold">{{ t.orderCode }}</p>
          <p class="text-xs text-slate-500">{{ t.createdAt | date:'dd/MM/yyyy HH:mm' }} · {{ methodLabel(t.method) }}</p>
        </div>
        <div class="text-right">
          <p class="font-bold text-indigo-600">{{ t.amount | currencyVnd }}</p>
          <span class="text-xs px-2 py-0.5 rounded-full font-semibold" [class]="payStatusClass(t.status)">{{ t.status }}</span>
        </div>
      </article>
    } @empty {
      <p class="text-center py-12 text-slate-400">Chưa có giao dịch</p>
    }
  </div>
</section>
