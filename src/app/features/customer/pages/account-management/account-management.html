<section class="max-w-lg mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-slate-900 mb-1">Quản lý tài khoản</h1>
  <p class="text-sm text-slate-500 mb-6">Mã: <span class="font-mono text-indigo-600">CTM-ACC01</span></p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl border p-6 space-y-4 shadow-sm" novalidate>
    <div>
      <label class="block text-sm font-medium mb-1">Họ và tên *</label>
      <input formControlName="fullName" class="w-full px-4 py-3 text-sm border rounded-xl" [class.border-red-400]="fieldError('fullName')" [class.border-slate-200]="!fieldError('fullName')" />
      @if (fieldError('fullName'); as e) { <p class="text-xs text-red-600 mt-1">{{ e }}</p> }
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input formControlName="email" class="w-full px-4 py-3 text-sm border border-slate-200 rounded-xl bg-slate-50" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Số điện thoại *</label>
      <input formControlName="phone" class="w-full px-4 py-3 text-sm border rounded-xl" [class.border-red-400]="fieldError('phone')" [class.border-slate-200]="!fieldError('phone')" />
      @if (fieldError('phone'); as e) { <p class="text-xs text-red-600 mt-1">{{ e }}</p> }
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Địa chỉ giao hàng *</label>
      <textarea formControlName="address" rows="2" class="w-full px-4 py-3 text-sm border rounded-xl" [class.border-red-400]="fieldError('address')" [class.border-slate-200]="!fieldError('address')"></textarea>
      @if (fieldError('address'); as e) { <p class="text-xs text-red-600 mt-1">{{ e }}</p> }
    </div>
    <div class="pt-2 border-t">
      <p class="text-sm font-medium text-slate-700 mb-3">Đổi mật khẩu (tùy chọn)</p>
      <input type="password" formControlName="password" placeholder="Mật khẩu mới" class="w-full px-4 py-3 text-sm border border-slate-200 rounded-xl mb-2" />
      <input type="password" formControlName="confirmPassword" placeholder="Xác nhận mật khẩu" class="w-full px-4 py-3 text-sm border border-slate-200 rounded-xl" />
    </div>
    <button type="submit" [disabled]="isSaving()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-70 cursor-pointer">
      {{ isSaving() ? 'Đang lưu...' : 'Lưu thay đổi' }}
    </button>
  </form>
</section>
