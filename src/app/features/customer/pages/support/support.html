<section class="max-w-lg mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-slate-900 mb-1">Hỗ trợ & Khiếu nại</h1>
  <p class="text-sm text-slate-500 mb-6">Mã: <span class="font-mono text-indigo-600">CTM-SPT01</span></p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl border p-6 space-y-4 shadow-sm" novalidate>
    <div>
      <label class="block text-sm font-medium mb-1">Loại yêu cầu *</label>
      <select formControlName="type" class="w-full px-4 py-3 text-sm border border-slate-200 rounded-xl bg-white">
        <option value="technical">Hỗ trợ kỹ thuật</option>
        <option value="order">Khiếu nại đơn hàng</option>
        <option value="payment">Thanh toán</option>
        <option value="other">Khác</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Tiêu đề *</label>
      <input formControlName="subject" class="w-full px-4 py-3 text-sm border rounded-xl" [class.border-red-400]="fieldError('subject')" [class.border-slate-200]="!fieldError('subject')" />
      @if (fieldError('subject'); as e) { <p class="text-xs text-red-600 mt-1">{{ e }}</p> }
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Mã đơn (nếu có)</label>
      <input formControlName="orderCode" placeholder="DH20240001" class="w-full px-4 py-3 text-sm border border-slate-200 rounded-xl" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Nội dung *</label>
      <textarea formControlName="message" rows="5" class="w-full px-4 py-3 text-sm border rounded-xl" [class.border-red-400]="fieldError('message')" [class.border-slate-200]="!fieldError('message')"></textarea>
      @if (fieldError('message'); as e) { <p class="text-xs text-red-600 mt-1">{{ e }}</p> }
    </div>
    <button type="submit" [disabled]="isSubmitting()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl disabled:opacity-70 cursor-pointer">
      {{ isSubmitting() ? 'Đang gửi...' : 'Gửi yêu cầu' }}
    </button>
  </form>
</section>
