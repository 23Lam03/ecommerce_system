<section class="min-h-[calc(100dvh-8rem)] flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-600 text-white text-2xl font-bold mb-4 shadow-lg shadow-indigo-200">E</div>
      <h1 class="text-2xl sm:text-3xl font-bold text-slate-900">Đăng nhập</h1>
      <p class="text-sm text-slate-500 mt-2">Mã màn hình: <span class="font-mono text-indigo-600">CTM-LOG01</span></p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8 space-y-5" novalidate>
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email <span class="text-red-500">*</span></label>
        <input id="email" type="email" formControlName="email" placeholder="email@example.com" autocomplete="email"
          class="w-full px-4 py-3 text-sm border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/30"
          [class.border-red-400]="fieldError('email')" [class.border-slate-200]="!fieldError('email')" />
        @if (fieldError('email'); as err) { <p class="mt-1.5 text-xs text-red-600 font-medium">{{ err }}</p> }
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Mật khẩu <span class="text-red-500">*</span></label>
        <div class="relative">
          <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="••••••" autocomplete="current-password"
            class="w-full px-4 py-3 pr-11 text-sm border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/30"
            [class.border-red-400]="fieldError('password')" [class.border-slate-200]="!fieldError('password')" />
          <button type="button" (click)="showPassword.update(v => !v)" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600 cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
        @if (fieldError('password'); as err) { <p class="mt-1.5 text-xs text-red-600 font-medium">{{ err }}</p> }
      </div>

      <button type="submit" [disabled]="isSubmitting()"
        class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 active:scale-[0.98] disabled:opacity-70 cursor-pointer">
        @if (isSubmitting()) { Đang đăng nhập... } @else { Đăng nhập }
      </button>

      <div class="pt-3 border-t border-slate-100">
        <p class="text-xs text-slate-500 text-center mb-2">Tài khoản demo (mật khẩu: 123456)</p>
        <div class="flex flex-wrap justify-center gap-2">
          <button type="button" (click)="fillDemo('customer')" class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-indigo-50 text-slate-600 cursor-pointer">Khách hàng</button>
          <button type="button" (click)="fillDemo('shop')" class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-emerald-50 text-slate-600 cursor-pointer">Shop</button>
          <button type="button" (click)="fillDemo('admin')" class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-violet-50 text-slate-600 cursor-pointer">Admin</button>
        </div>
      </div>

      <p class="text-center text-sm text-slate-500">
        Chưa có tài khoản? <a routerLink="/register" class="text-indigo-600 font-semibold hover:text-indigo-700">Đăng ký</a>
      </p>
    </form>
  </div>
</section>
