<section class="max-w-4xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-slate-900 mb-1">Ưu đãi & Khuyến mãi</h1>
  <p class="text-sm text-slate-500 mb-6">Mã: <span class="font-mono text-indigo-600">CTM-PRM01</span></p>

  <div class="space-y-4 mb-8">
    @for (b of banners; track b.id) {
      <div class="rounded-2xl p-6 text-white bg-gradient-to-r shadow-lg" [class]="b.gradient">
        <h2 class="text-2xl font-bold">{{ b.title }}</h2>
        <p class="text-white/90 mt-1">{{ b.subtitle }}</p>
        <p class="text-xs text-white/70 mt-2">HSD: {{ b.expires }}</p>
        @if (b.code) {
          <button type="button" (click)="copyCode(b.code!)" class="mt-4 px-4 py-2 bg-white/20 hover:bg-white/30 rounded-xl text-sm font-semibold cursor-pointer">
            Sao chép mã: {{ b.code }}
          </button>
        }
      </div>
    }
  </div>

  <a routerLink="/cart" class="inline-flex px-6 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700">
    Dùng mã tại giỏ hàng →
  </a>
</section>
